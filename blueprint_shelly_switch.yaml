blueprint:
  name: Shelly Detached Input - Switch Only v1.0.0
  domain: automation
  description: >
    Use a detached-mode Shelly wall switch via a binary_sensor to control a light
    or run custom actions, without cutting power to the load.

  input:
    primary_input:
      name: Binary sensor input
      description: >
        The binary_sensor that represents the detached switch input.
      selector:
        entity:
          domain: binary_sensor

    action_mode:
      name: Action mode
      description: >
        Choose how this automation reacts.
        - lamp: directly control a light entity
        - custom: execute your own action sequences
      default: lamp
      selector:
        select:
          options:
            - lamp
            - custom

    lamp_entity:
      name: "[Lamp mode] Lamp entity"
      description: >
        Required when Action mode is set to 'lamp'.
      default: {}
      selector:
        entity:
          domain: light

    confirm_switch:
      name: Confirm switch (optional)
      description: >
        Optional Shelly feedback output. Turned on after each executed action.
      default: {}
      selector:
        entity:
          domain: switch

    custom_on:
      name: "[Custom] ON action"
      description: Executed when the switch goes from OFF to ON.
      default: []
      selector:
        action: {}

    custom_off:
      name: "[Custom] OFF action"
      description: Executed when the switch goes from ON to OFF.
      default: []
      selector:
        action: {}

variables:
  action_mode_var: !input action_mode
  confirm_switch_var: !input confirm_switch

trigger:
  - platform: state
    entity_id: !input primary_input
    from: "off"
    to: "on"
    id: switch_on

  - platform: state
    entity_id: !input primary_input
    from: "on"
    to: "off"
    id: switch_off

condition: []

action:
  - choose:
      - conditions:
          - condition: trigger
            id: switch_on
        sequence:
          - choose:
              - conditions:
                  - condition: template
                    value_template: "{{ action_mode_var == 'lamp' }}"
                sequence:
                  - service: light.toggle
                    target:
                      entity_id: !input lamp_entity
              - conditions:
                  - condition: template
                    value_template: "{{ action_mode_var == 'custom' }}"
                sequence: !input custom_on

      - conditions:
          - condition: trigger
            id: switch_off
        sequence:
          - choose:
              - conditions:
                  - condition: template
                    value_template: "{{ action_mode_var == 'custom' }}"
                sequence: !input custom_off

  - choose:
      - conditions:
          - condition: template
            value_template: "{{ confirm_switch_var is not none and confirm_switch_var != '' }}"
        sequence:
          - service: switch.turn_on
            target:
              entity_id: !input confirm_switch

mode: single
