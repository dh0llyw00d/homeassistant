blueprint:
  name: Shelly Detached Switch - Toggle Light
  description: >
    Toggle a light when a Shelly detached-mode switch input changes state.
    Use the Shelly input binary_sensor as the trigger source.
  domain: automation
  input:
    shelly_input:
      name: Shelly input
      description: >
        Select the Shelly binary_sensor that changes when the wall switch is flipped.
      selector:
        entity:
          domain: binary_sensor

    target_light:
      name: Light to toggle
      description: The light entity to toggle.
      selector:
        target:
          entity:
            domain: light

trigger:
  - platform: state
    entity_id: !input shelly_input

condition: []

action:
  - service: light.toggle
    target: !input target_light

mode: single
